<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense & Budget Visualizer</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>

  <div class="app-wrapper">
    <h1 class="app-title">Expense & Budget Visualizer</h1>

    <!-- Balance Card -->
    <div class="card balance-card">
      <p class="balance-label">TOTAL BALANCE</p>
      <p class="balance-amount" id="totalBalance">$0.00</p>
    </div>

    <!-- Add Transaction Form -->
    <div class="card form-card">
      <h2 class="section-title">Add Transaction</h2>

      <div class="form-group">
        <label for="itemName">Item Name</label>
        <input type="text" id="itemName" placeholder="e.g. Coffee" />
      </div>

      <div class="form-group">
        <label for="amount">Amount</label>
        <input type="number" id="amount" placeholder="0.00" step="0.01" min="0" />
      </div>

      <div class="form-group">
        <label for="category">Category</label>
        <select id="category">
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Fun">Fun</option>
          <option value="Shopping">Shopping</option>
          <option value="Health">Health</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <button class="btn-add" id="addBtn">Add Transaction</button>
    </div>

    <!-- Transactions + Chart -->
    <div class="bottom-grid">
      <div class="card transactions-card">
        <h2 class="section-title">Transactions</h2>
        <div id="transactionList"></div>
      </div>

      <div class="card chart-card">
        <h2 class="section-title">Spending by Category</h2>
        <div class="chart-wrapper">
          <canvas id="spendingChart"></canvas>
        </div>
        <div id="chartLegend" class="chart-legend"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>

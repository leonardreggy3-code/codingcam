<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense & Budget Visualizer</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>

  <div class="app-wrapper">

    <!-- Header -->
    <div class="app-header">
      <h1 class="app-title">Expense & Budget Visualizer</h1>
      <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">
        <span class="toggle-icon toggle-sun">☀️</span>
        <span class="toggle-icon toggle-moon">🌙</span>
      </button>
    </div>

    <!-- Balance Card -->
    <div class="card balance-card">
      <p class="balance-label">TOTAL BALANCE</p>
      <p class="balance-amount" id="totalBalance">$0.00</p>
    </div>

    <!-- Add Transaction Form -->
    <div class="card form-card">
      <h2 class="section-title">Add Transaction</h2>

      <div class="form-group">
        <label for="itemName">Item Name</label>
        <input type="text" id="itemName" placeholder="e.g. Coffee" />
      </div>

      <div class="form-group">
        <label for="amount">Amount</label>
        <input type="number" id="amount" placeholder="0.00" step="0.01" min="0" />
      </div>

      <div class="form-group">
        <label for="category">Category</label>
        <select id="category">
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Fun">Fun</option>
          <option value="Shopping">Shopping</option>
          <option value="Health">Health</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="spendLimit">Spending Limit per Transaction</label>
        <div class="limit-row">
          <input type="number" id="spendLimit" placeholder="e.g. 50.00" step="0.01" min="0" />
          <span class="limit-status" id="limitStatus" style="display:none"></span>
        </div>
      </div>

      <button class="btn-add" id="addBtn">Add Transaction</button>
    </div>

    <!-- Tab Nav -->
    <div class="tab-nav">
      <button class="tab-btn active" id="tabTransactions" onclick="switchTab('transactions')">Transactions</button>
      <button class="tab-btn" id="tabMonthly" onclick="switchTab('monthly')">Monthly Summary</button>
    </div>

    <!-- Transactions View -->
    <div id="viewTransactions">
      <div class="bottom-grid">
        <div class="card transactions-card">
          <h2 class="section-title">Transactions</h2>
          <div id="transactionList"></div>
        </div>

        <div class="card chart-card">
          <h2 class="section-title">Spending by Category</h2>
          <div class="chart-wrapper">
            <canvas id="spendingChart"></canvas>
          </div>
          <div id="chartLegend" class="chart-legend"></div>
        </div>
      </div>
    </div>

    <!-- Monthly Summary View -->
    <div id="viewMonthly" style="display:none;">
      <div class="card">
        <div class="month-selector">
          <button class="month-nav-btn" id="prevMonth">&#8249;</button>
          <span class="month-label" id="monthLabel">—</span>
          <button class="month-nav-btn" id="nextMonth">&#8250;</button>
        </div>
        <div class="summary-stats">
          <div class="stat-box">
            <div class="stat-label">Transactions</div>
            <div class="stat-value accent" id="statCount">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Total Spent</div>
            <div class="stat-value" id="statTotal">$0.00</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Over Limit</div>
            <div class="stat-value danger" id="statOver">0</div>
          </div>
        </div>
        <div class="month-breakdown" id="monthBreakdown"></div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
